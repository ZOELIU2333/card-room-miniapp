<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开局 - 暗色牌具品牌原型</title>
    <style>
      :root {
        --bg: #090a09;
        --panel: #121312;
        --panel-2: #181917;
        --line: rgba(238, 229, 207, 0.13);
        --line-strong: rgba(238, 229, 207, 0.24);
        --text: #eee5d1;
        --muted: #a59d8d;
        --faint: #6f6a60;
        --jade: #8ca58e;
        --jade-dim: #28362d;
        --bronze: #b5a27e;
        --danger: #bd6259;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 70% 7%, rgba(181, 162, 126, 0.13), transparent 28%),
          radial-gradient(circle at 18% 38%, rgba(106, 126, 100, 0.14), transparent 26%),
          linear-gradient(145deg, #050606 0%, #10110f 48%, #080908 100%);
        color: var(--text);
        font-family:
          ui-serif,
          "Songti SC",
          "Noto Serif SC",
          "PingFang SC",
          "Microsoft YaHei",
          serif;
      }

      button,
      input {
        font: inherit;
      }

      .phone {
        position: relative;
        width: min(100vw, 430px);
        min-height: 100vh;
        margin: 0 auto;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px) 0 0 / 28px 28px,
          linear-gradient(0deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px) 0 0 / 28px 28px,
          var(--bg);
      }

      .phone::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 72% 18%, rgba(238, 229, 207, 0.1), transparent 22%),
          radial-gradient(circle at 52% 0%, rgba(140, 165, 142, 0.1), transparent 28%);
        opacity: 0.9;
      }

      .screen {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        padding: 28px 18px 106px;
      }

      .topbar,
      .top-actions,
      .profile,
      .points,
      .tabbar,
      .nav-item,
      .friend-avatars,
      .room-meta {
        display: flex;
        align-items: center;
      }

      .topbar {
        justify-content: space-between;
        gap: 12px;
      }

      .profile {
        gap: 12px;
        min-width: 0;
      }

      .avatar {
        width: 54px;
        height: 54px;
        flex: 0 0 auto;
        border-radius: 50%;
        border: 1px solid rgba(238, 229, 207, 0.42);
        background:
          linear-gradient(160deg, rgba(255, 255, 255, 0.08), transparent 50%),
          radial-gradient(circle at 34% 28%, #aeb7b3, #343a37 42%, #121313 70%);
      }

      .name {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 20px;
        font-weight: 650;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .rank {
        padding: 2px 7px;
        border: 1px solid rgba(140, 165, 142, 0.35);
        border-radius: 999px;
        color: #b8c6b8;
        background: rgba(140, 165, 142, 0.08);
        font-family: "PingFang SC", sans-serif;
        font-size: 11px;
      }

      .points {
        margin-top: 5px;
        gap: 7px;
        color: var(--text);
        font-family: "PingFang SC", sans-serif;
        font-size: 17px;
      }

      .coin {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        border: 1px solid rgba(238, 229, 207, 0.4);
        background: linear-gradient(145deg, #d4c4a3, #5a5245);
      }

      .top-actions {
        gap: 16px;
      }

      .icon-button {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(238, 229, 207, 0.2);
        border-radius: 15px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.035);
      }

      .line-icon {
        position: relative;
        display: block;
        width: 19px;
        height: 19px;
      }

      .line-icon.chat {
        border: 2px solid currentColor;
        border-radius: 6px;
      }

      .line-icon.chat::after {
        content: "";
        position: absolute;
        right: 2px;
        bottom: -5px;
        width: 7px;
        height: 7px;
        border-right: 2px solid currentColor;
        border-bottom: 2px solid currentColor;
        transform: rotate(35deg);
      }

      .line-icon.settings {
        border: 2px solid currentColor;
        border-radius: 50%;
      }

      .line-icon.settings::before,
      .line-icon.settings::after {
        content: "";
        position: absolute;
        inset: 5px;
        border: 2px solid currentColor;
        border-radius: 50%;
      }

      .line-icon.settings::after {
        inset: -6px 7px;
        border-width: 0 2px;
        border-radius: 0;
      }

      .hero {
        position: relative;
        margin-top: 44px;
        min-height: 204px;
      }

      .hero-title {
        margin: 0;
        color: var(--text);
        font-size: 72px;
        font-weight: 520;
        line-height: 0.94;
        letter-spacing: 0;
      }

      .hero-copy {
        margin: 18px 0 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }

      .brand-object {
        position: absolute;
        right: -62px;
        top: -18px;
        width: 215px;
        height: 190px;
        opacity: 0.66;
        transform: rotate(-8deg);
      }

      .brand-object::before,
      .brand-object::after {
        content: "";
        position: absolute;
        border-radius: 22px;
        border: 1px solid rgba(238, 229, 207, 0.18);
        background:
          linear-gradient(145deg, rgba(238, 229, 207, 0.08), rgba(0, 0, 0, 0.06)),
          #151614;
        box-shadow: var(--shadow);
      }

      .brand-object::before {
        right: 35px;
        top: 15px;
        width: 132px;
        height: 180px;
      }

      .brand-object::after {
        right: 0;
        top: 0;
        width: 86px;
        height: 128px;
        border-radius: 14px;
        background:
          linear-gradient(145deg, rgba(238, 229, 207, 0.18), rgba(0, 0, 0, 0.12)),
          #20211f;
      }

      .actions-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: -8px;
      }

      .action-card {
        position: relative;
        min-height: 178px;
        border: 1px solid var(--line-strong);
        border-radius: 18px;
        padding: 18px 16px;
        text-align: left;
        color: var(--text);
        background:
          linear-gradient(150deg, rgba(255, 255, 255, 0.052), rgba(255, 255, 255, 0.012)),
          var(--panel);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
        cursor: pointer;
        transition:
          transform 160ms ease,
          border-color 160ms ease,
          background 160ms ease;
      }

      .action-card:active,
      .action-card.is-active {
        transform: translateY(1px);
        border-color: rgba(238, 229, 207, 0.36);
        background:
          linear-gradient(150deg, rgba(238, 229, 207, 0.06), rgba(140, 165, 142, 0.045)),
          #151614;
      }

      .action-card.primary {
        background:
          linear-gradient(150deg, rgba(140, 165, 142, 0.18), rgba(255, 255, 255, 0.018)),
          #121713;
      }

      .object-token {
        width: 58px;
        height: 58px;
        border: 1px solid rgba(238, 229, 207, 0.34);
        border-radius: 50%;
        background:
          radial-gradient(circle at 36% 28%, rgba(255, 255, 255, 0.85), rgba(238, 229, 207, 0.46) 42%, rgba(24, 25, 23, 0.88) 100%);
      }

      .action-title {
        margin: 18px 0 8px;
        font-size: 28px;
        line-height: 1.18;
        font-weight: 560;
      }

      .action-sub {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .arrow {
        position: absolute;
        right: 14px;
        bottom: 14px;
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 1px solid var(--line);
        border-radius: 50%;
        color: var(--text);
      }

      .arrow::before {
        content: "";
        width: 9px;
        height: 9px;
        border-top: 2px solid currentColor;
        border-right: 2px solid currentColor;
        transform: rotate(45deg);
      }

      .room-input {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 4px;
        margin-top: 16px;
        padding: 10px;
        border: 1px solid rgba(238, 229, 207, 0.1);
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.16);
      }

      .room-input span {
        display: grid;
        place-items: center;
        height: 22px;
        color: var(--muted);
        font-family: "PingFang SC", sans-serif;
        font-size: 15px;
        border-right: 1px solid rgba(238, 229, 207, 0.08);
      }

      .room-input span:last-child {
        border-right: 0;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 28px 2px 12px;
      }

      .section-title {
        font-size: 22px;
        font-weight: 560;
      }

      .section-link {
        color: var(--muted);
        font-family: "PingFang SC", sans-serif;
        font-size: 14px;
      }

      .game-tabs {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        border: 1px solid var(--line);
        border-radius: 17px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.025);
      }

      .game-tab {
        min-height: 76px;
        border: 0;
        border-right: 1px solid rgba(238, 229, 207, 0.07);
        color: var(--muted);
        background: transparent;
        cursor: pointer;
      }

      .game-tab:last-child {
        border-right: 0;
      }

      .game-tab.is-active {
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(238, 229, 207, 0.06), rgba(140, 165, 142, 0.075)),
          rgba(255, 255, 255, 0.02);
        box-shadow: inset 0 -2px 0 rgba(238, 229, 207, 0.48);
      }

      .game-mark {
        display: block;
        margin-bottom: 7px;
        color: var(--bronze);
        font-size: 17px;
      }

      .invite-card,
      .record-card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.044), rgba(255, 255, 255, 0.012)),
          rgba(18, 19, 18, 0.94);
      }

      .invite-card {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 16px;
      }

      .room-thumb {
        width: 62px;
        height: 62px;
        border-radius: 50%;
        border: 1px solid rgba(238, 229, 207, 0.22);
        background:
          radial-gradient(circle at 40% 26%, #9aa59c, #333b34 45%, #141614 74%);
      }

      .invite-title {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 8px;
        font-size: 22px;
        font-weight: 560;
      }

      .status {
        padding: 3px 7px;
        border: 1px solid rgba(140, 165, 142, 0.24);
        border-radius: 999px;
        color: #b9c9b7;
        background: rgba(140, 165, 142, 0.1);
        font-family: "PingFang SC", sans-serif;
        font-size: 12px;
      }

      .room-meta {
        gap: 9px;
        color: var(--muted);
        font-family: "PingFang SC", sans-serif;
        font-size: 14px;
      }

      .join-button {
        min-width: 92px;
        height: 44px;
        border: 1px solid rgba(238, 229, 207, 0.22);
        border-radius: 15px;
        color: var(--text);
        background:
          linear-gradient(145deg, rgba(238, 229, 207, 0.08), rgba(140, 165, 142, 0.12)),
          #252a25;
      }

      .record-card {
        padding: 9px 14px;
      }

      .record-row {
        display: grid;
        grid-template-columns: 42px 1fr auto;
        gap: 12px;
        align-items: center;
        padding: 11px 0;
        border-bottom: 1px solid rgba(238, 229, 207, 0.08);
      }

      .record-row:last-child {
        border-bottom: 0;
      }

      .tile {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 10px;
        color: #294632;
        background: linear-gradient(145deg, #ede6d4, #918774);
        font-size: 19px;
        font-weight: 700;
      }

      .record-name {
        font-size: 16px;
        margin-bottom: 3px;
      }

      .record-sub {
        color: var(--muted);
        font-family: "PingFang SC", sans-serif;
        font-size: 13px;
      }

      .score {
        font-family: "PingFang SC", sans-serif;
        font-size: 16px;
      }

      .score.win {
        color: #8fb692;
      }

      .score.lose {
        color: var(--danger);
      }

      .tabbar {
        position: fixed;
        left: 50%;
        bottom: 0;
        z-index: 10;
        width: min(100vw, 430px);
        height: 82px;
        transform: translateX(-50%);
        justify-content: space-around;
        padding: 8px 14px 12px;
        border-top: 1px solid rgba(238, 229, 207, 0.12);
        background:
          linear-gradient(180deg, rgba(22, 23, 21, 0.88), rgba(8, 9, 8, 0.98)),
          rgba(8, 9, 8, 0.96);
        backdrop-filter: blur(18px);
      }

      .nav-item {
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        min-width: 54px;
        height: 62px;
        border: 0;
        color: #9c978c;
        background: transparent;
        cursor: pointer;
      }

      .nav-item i {
        width: 22px;
        height: 22px;
      }

      .nav-icon {
        position: relative;
        display: block;
        width: 22px;
        height: 22px;
      }

      .nav-icon.home::before {
        content: "";
        position: absolute;
        left: 3px;
        top: 8px;
        width: 16px;
        height: 12px;
        border: 2px solid currentColor;
        border-top: 0;
        border-radius: 3px;
      }

      .nav-icon.home::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 2px;
        width: 14px;
        height: 14px;
        border-left: 2px solid currentColor;
        border-top: 2px solid currentColor;
        transform: rotate(45deg);
      }

      .nav-icon.users::before,
      .nav-icon.user::before {
        content: "";
        position: absolute;
        left: 7px;
        top: 1px;
        width: 8px;
        height: 8px;
        border: 2px solid currentColor;
        border-radius: 50%;
      }

      .nav-icon.users::after,
      .nav-icon.user::after {
        content: "";
        position: absolute;
        left: 3px;
        bottom: 1px;
        width: 16px;
        height: 9px;
        border: 2px solid currentColor;
        border-radius: 10px 10px 3px 3px;
      }

      .nav-icon.users {
        box-shadow: -8px 4px 0 -6px currentColor, 8px 4px 0 -6px currentColor;
      }

      .nav-icon.chart::before {
        content: "";
        position: absolute;
        left: 2px;
        bottom: 2px;
        width: 4px;
        height: 10px;
        background: currentColor;
        border-radius: 3px;
        box-shadow: 8px -5px 0 currentColor, 16px -10px 0 currentColor;
      }

      .nav-icon.plus::before,
      .nav-icon.plus::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 10px;
        width: 14px;
        height: 2px;
        background: currentColor;
        border-radius: 2px;
      }

      .nav-icon.plus::after {
        transform: rotate(90deg);
      }

      .nav-item.is-active {
        color: var(--text);
      }

      .nav-item.center {
        color: var(--text);
      }

      .nav-item.center .nav-core {
        display: grid;
        place-items: center;
        width: 46px;
        height: 46px;
        margin-top: -22px;
        border: 1px solid rgba(238, 229, 207, 0.24);
        border-radius: 50%;
        background:
          radial-gradient(circle at 36% 28%, rgba(238, 229, 207, 0.16), transparent 40%),
          #1b241d;
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.46);
      }

      .nav-label {
        font-family: "PingFang SC", sans-serif;
        font-size: 13px;
      }

      @media (max-width: 370px) {
        .hero-title {
          font-size: 62px;
        }

        .action-title {
          font-size: 24px;
        }

        .game-tab {
          min-height: 68px;
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <main class="phone">
      <section class="screen">
        <header class="topbar">
          <div class="profile">
            <div class="avatar" aria-hidden="true"></div>
            <div>
              <div class="name">清风徐来 <span class="rank">青铜 III</span></div>
              <div class="points"><span class="coin" aria-hidden="true"></span>12,860</div>
            </div>
          </div>
          <div class="top-actions">
            <button class="icon-button" aria-label="消息"><span class="line-icon chat" aria-hidden="true"></span></button>
            <button class="icon-button" aria-label="设置"><span class="line-icon settings" aria-hidden="true"></span></button>
          </div>
        </header>

        <section class="hero" aria-label="开局">
          <h1 class="hero-title">开局</h1>
          <p class="hero-copy">与好友，开一局<br />私密 · 可靠 · 尽兴</p>
          <div class="brand-object" aria-hidden="true"></div>
        </section>

        <section class="actions-grid" aria-label="主要操作">
          <button class="action-card primary is-active" data-action-card>
            <span class="object-token" aria-hidden="true"></span>
            <div class="action-title">创建好友房</div>
            <div class="action-sub">邀请好友，开局对战</div>
            <span class="arrow" aria-hidden="true"></span>
          </button>

          <button class="action-card" data-action-card>
            <span class="object-token" aria-hidden="true"></span>
            <div class="action-title">输入房号</div>
            <div class="action-sub">加入已有房间</div>
            <div class="room-input" aria-hidden="true">
              <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span>
            </div>
          </button>
        </section>

        <div class="section-head">
          <div class="section-title">选择玩法</div>
          <div class="section-link">更多玩法</div>
        </div>
        <section class="game-tabs" aria-label="玩法选择">
          <button class="game-tab is-active" data-game="跑得快"><span class="game-mark">A K Q</span>跑得快</button>
          <button class="game-tab" data-game="240"><span class="game-mark">240</span>240</button>
          <button class="game-tab" data-game="麻将"><span class="game-mark">发</span>麻将</button>
          <button class="game-tab" data-game="掼蛋"><span class="game-mark">牌</span>掼蛋</button>
          <button class="game-tab" data-game="字牌"><span class="game-mark">东</span>字牌</button>
        </section>

        <div class="section-head">
          <div class="section-title">好友邀请</div>
          <div class="section-link">全部邀请</div>
        </div>
        <section class="invite-card">
          <div class="room-thumb" aria-hidden="true"></div>
          <div>
            <div class="invite-title">老刘等你 <span class="status">等待中</span></div>
            <div class="room-meta">240 · 经典玩法 · 3/4 人</div>
          </div>
          <button class="join-button">立即加入</button>
        </section>

        <div class="section-head">
          <div class="section-title">最近对局</div>
          <div class="section-link">全部记录</div>
        </div>
        <section class="record-card">
          <div class="record-row">
            <div class="tile">发</div>
            <div>
              <div class="record-name">好友房 · 麻将</div>
              <div class="record-sub">8局 · 2小时前</div>
            </div>
            <div class="score win">+320</div>
          </div>
          <div class="record-row">
            <div class="tile">A</div>
            <div>
              <div class="record-name">好友房 · 跑得快</div>
              <div class="record-sub">12局 · 昨天 21:30</div>
            </div>
            <div class="score lose">-120</div>
          </div>
        </section>
      </section>

      <nav class="tabbar" aria-label="底部导航">
        <button class="nav-item is-active" data-nav>
          <span class="nav-icon home" aria-hidden="true"></span><span class="nav-label">首页</span>
        </button>
        <button class="nav-item" data-nav>
          <span class="nav-icon users" aria-hidden="true"></span><span class="nav-label">牌友</span>
        </button>
        <button class="nav-item center" data-nav>
          <span class="nav-core"><span class="nav-icon plus" aria-hidden="true"></span></span><span class="nav-label">开一桌</span>
        </button>
        <button class="nav-item" data-nav>
          <span class="nav-icon chart" aria-hidden="true"></span><span class="nav-label">战绩</span>
        </button>
        <button class="nav-item" data-nav>
          <span class="nav-icon user" aria-hidden="true"></span><span class="nav-label">我的</span>
        </button>
      </nav>
    </main>

    <script>
      document.querySelectorAll("[data-action-card]").forEach((card) => {
        card.addEventListener("click", () => {
          document.querySelectorAll("[data-action-card]").forEach((item) => item.classList.remove("is-active"));
          card.classList.add("is-active");
        });
      });

      document.querySelectorAll(".game-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".game-tab").forEach((item) => item.classList.remove("is-active"));
          tab.classList.add("is-active");
        });
      });

      document.querySelectorAll("[data-nav]").forEach((item) => {
        item.addEventListener("click", () => {
          document.querySelectorAll("[data-nav]").forEach((nav) => nav.classList.remove("is-active"));
          item.classList.add("is-active");
        });
      });
    </script>
  </body>
</html>
